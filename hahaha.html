<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="hottie.css">
</head>
<body>
     <script src="omagooo.js"></script>
     
     <form action="#" method="post">
        <div> 
            <h1>Register</h1>
           
        
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
            <label for="Phone Number"> Phone Number:</label><br>
            <input type="tel" id="Phone" name="Number" pattern="[0-9]{10}" maxlength="10" minlength="10" required><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="blood-group">Blood Group:</label><br>
            <select id="blood-group" name="blood-group" required>
                <option value=""></option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>  
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                </select><br><br>

            <label for="weight">Weight (kg):</label><br>
            <input type="number" id="weight" name="Weight" min="50" required><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age" min="19" required><br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Submit</button>
        </div>
    </form>
</body>
</html>
