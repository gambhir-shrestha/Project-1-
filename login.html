<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeGive — Blood Donation </title>

  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <div class="page-bg">
    <div class="fb-wrap">

      <!-- LEFT PANEL -->
      <div class="left-panel">
        <div class="logo-area">
          <div class="logo-text">
            <div class="brand">Blood Bridge</div>
            <div class="sub">Blood Donation</div>
          </div>
        </div>

        <div class="hero-copy">
          <h1>Every drop<br>saves a <span>life.</span></h1>
          <p>One donation can save up to three lives. Join our community of heroes and make a difference today.</p>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="num">4.5M</div>
            <div class="lbl">Donors</div>
          </div>
          <div class="stat-box">
            <div class="num">13M</div>
            <div class="lbl">Lives saved</div>
          </div>
          <div class="stat-box">
            <div class="num">98%</div>
            <div class="lbl">Match rate</div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="right-header">
          <p class="greet"> Portal</p>
          <h2>Log into Blood Bridge</h2>
        </div>

        <form class="login-form" onsubmit="return false;">
          <div class="field-group">
            <label for="email">Email or mobile number</label>
            <input id="email" type="text" placeholder="Email">
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Password"/>
          </div>

          <button class="btn-login" type="submit">Log in</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="btn-register">Create new account</button>

        <p class="forgot">Forgot password?</p>

        <div class="meta-footer">🩸 Blood &middot; </div>
      </div>

    </div>
  </div>

</body>
</html>
